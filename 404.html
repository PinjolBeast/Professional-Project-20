<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Bloom & Blush</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--soft-pink), var(--lavender), var(--peach));
      padding: 100px 20px;
    }
    
    .error-content {
      text-align: center;
      max-width: 600px;
    }
    
    .error-number {
      font-size: 8rem;
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--white);
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    
    .error-emoji {
      font-size: 6rem;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .error-content h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }
    
    .error-content p {
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    
    .error-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <!-- Error Page -->
  <section class="error-page">
    <div class="error-content">
      <div class="error-emoji">🌸</div>
      <div class="error-number">404</div>
      <h1>Oops! Page Not Found</h1>
      <p>Looks like this flower has wilted! The page you're looking for doesn't exist or has been moved.</p>
      <div class="error-buttons">
        <a href="index.html" class="btn btn-primary btn-lg">
          <i class="fas fa-home"></i> Go Home
        </a>
        <a href="contact.html" class="btn btn-secondary btn-lg">
          <i class="fas fa-envelope"></i> Contact Us
        </a>
      </div>
    </div>
  </section>
</body>
</html>
